<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Tic Tac Toe Pro - Multiplayer</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --x: #ff4757; --o: #2ed573; --gold: #fbbf24; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; box-sizing: border-box; }
        .app-box { width: 100%; max-width: 400px; text-align: center; }
        
        /* Stats & Score */
        .score-row { display: flex; justify-content: space-between; background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; font-weight: bold; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        
        /* Timer System */
        .timer-container { width: 100%; background: #334155; height: 8px; border-radius: 10px; margin-bottom: 15px; overflow: hidden; border: 1px solid #475569; }
        #timer-bar { width: 100%; height: 100%; background: var(--accent); transition: width 0.1s linear; }

        /* Game Board */
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .cell { aspect-ratio: 1; background: var(--card); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; font-weight: bold; border: 1px solid #334155; cursor: pointer; transition: all 0.2s; position: relative; }
        .cell:active { transform: scale(0.9); }
        .cell.winner { background: var(--gold) !important; color: var(--bg) !important; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Status & Chat */
        #status { margin-bottom: 10px; color: var(--gold); font-weight: bold; font-size: 1.1rem; min-height: 1.5em; }
        .chat-container { background: #0d1117; border-radius: 12px; padding: 10px; border: 1px solid #334155; height: 100px; overflow-y: auto; text-align: left; font-size: 0.85rem; margin-bottom: 10px; }
        .chat-input { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; background: #1e293b; border: 1px solid #334155; color: white; padding: 12px; border-radius: 10px; outline: none; }
        input:focus { border-color: var(--accent); }

        button { background: var(--accent); color: #0f172a; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-full { width: 100%; }

        #setup-screen { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #334155; }
    </style>
</head>
<body>

<div class="app-box">
    <div id="setup-screen">
        <h2 style="margin-top:0;">Battle Online ⚔️</h2>
        <p style="font-size: 0.9rem; color: #94a3b8;">अपनी ID दोस्त को भेजें या उसकी ID यहाँ डालें</p>
        <div id="my-id-display" style="padding:15px; background:#0f172a; border-radius:12px; margin-bottom:15px; border:1px dashed var(--accent); cursor:pointer; font-family: monospace; font-size: 1.1rem;" onclick="copyId()">ID लोड हो रही है...</div>
        <input type="text" id="friend-id" placeholder="दोस्त की ID पेस्ट करें" style="width:100%; box-sizing:border-box; margin-bottom:15px; text-align: center;">
        <button class="btn-full" onclick="connectToFriend()">START CHALLENGE</button>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="score-row">
            <span style="color:var(--x)">YOU (X): <span id="sX">0</span></span>
            <span style="color:var(--o)">FRIEND (O): <span id="sO">0</span></span>
        </div>

        <div class="timer-container">
            <div id="timer-bar"></div>
        </div>

        <div id="status">कनेक्ट हो रहा है...</div>

        <div class="board" id="game-board">
            <div class="cell" onclick="makeMove(0)"></div>
            <div class="cell" onclick="makeMove(1)"></div>
            <div class="cell" onclick="makeMove(2)"></div>
            <div class="cell" onclick="makeMove(3)"></div>
            <div class="cell" onclick="makeMove(4)"></div>
            <div class="cell" onclick="makeMove(5)"></div>
            <div class="cell" onclick="makeMove(6)"></div>
            <div class="cell" onclick="makeMove(7)"></div>
            <div class="cell" onclick="makeMove(8)"></div>
        </div>
        
        <div class="chat-container" id="chat-msgs"></div>
        <div class="chat-input">
            <input type="text" id="msg-input" placeholder="मैसेज लिखें...">
            <button onclick="sendChat()">Send</button>
        </div>
        
        <button onclick="location.reload()" style="background:#334155; color:white;" class="btn-full">Exit Game</button>
    </div>
</div>

<script>
    let peer = new Peer();
    let conn, mySym, isTurn = false;
    let boardState = Array(9).fill("");
    let scoreX = 0, scoreO = 0;
    let timerInterval, timeLeft = 15;

    const moveSound = new Audio('https://www.soundjay.com/buttons/button-50.mp3');

    // PeerJS Setup
    peer.on('open', id => {
        document.getElementById('my-id-display').innerText = id;
        window.myId = id;
    });

    peer.on('connection', c => {
        conn = c; mySym = "X"; isTurn = true; 
        setupDataListener();
        initGameUI();
    });

    function connectToFriend() {
        const fId = document.getElementById('friend-id').value;
        if(!fId) return alert("ID जरूरी है!");
        conn = peer.connect(fId);
        mySym = "O"; isTurn = false;
        conn.on('open', () => {
            setupDataListener();
            initGameUI();
        });
    }

    function setupDataListener() {
        conn.on('data', data => {
            if(data.type === 'move') {
                boardState[data.idx] = data.sym;
                updateUI();
                isTurn = true;
                vibrate(50);
                moveSound.play();
                if(!checkWin()) startTimer();
            }
            if(data.type === 'chat') showChat('Friend', data.msg);
            if(data.type === 'timeout') {
                isTurn = true;
                updateStatus();
                startTimer();
            }
        });
    }

    function initGameUI() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        updateStatus();
        if(isTurn) startTimer();
    }

    // Timer Logic
    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 15;
        const bar = document.getElementById('timer-bar');
        
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            const percentage = (timeLeft / 15) * 100;
            bar.style.width = percentage + "%";
            
            // 3 सेकंड बचने पर लाल रंग
            bar.style.background = timeLeft < 4 ? "var(--x)" : "var(--accent)";

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if(isTurn) handleTimeout();
            }
        }, 100);
    }

    function handleTimeout() {
        isTurn = false;
        conn.send({type: 'timeout'});
        updateStatus();
        alert("समय समाप्त! आपकी बारी चली गई।");
    }

    function makeMove(i) {
        if(!isTurn || boardState[i] !== "") return;
        
        boardState[i] = mySym;
        updateUI();
        conn.send({type: 'move', idx: i, sym: mySym});
        isTurn = false;
        vibrate(30);
        moveSound.play();
        clearInterval(timerInterval);
        
        if(!checkWin()) updateStatus();
    }

    function updateUI() {
        const cells = document.querySelectorAll('.cell');
        boardState.forEach((v, i) => {
            cells[i].innerText = v;
            cells[i].style.color = v === "X" ? "var(--x)" : "var(--o)";
        });
    }

    function checkWin() {
        const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for(let l of lines) {
            const [a,b,c] = l;
            if(boardState[a] && boardState[a]===boardState[b] && boardState[a]===boardState[c]) {
                const cells = document.querySelectorAll('.cell');
                [a,b,c].forEach(idx => cells[idx].classList.add('winner'));
                
                if(boardState[a] === "X") scoreX++; else scoreO++;
                document.getElementById('sX').innerText = scoreX;
                document.getElementById('sO').innerText = scoreO;

                clearInterval(timerInterval);
                setTimeout(() => {
                    if(boardState[a] === mySym) {
                        confetti(); alert("CONGRATS! आप जीत गए 🏆");
                    } else alert("OH NO! आप हार गए 💀");
                    resetBoard();
                }, 500);
                return true;
            }
        }
        if(!boardState.includes("")) { 
            clearInterval(timerInterval);
            setTimeout(() => { alert("मैच ड्रा! 🤝"); resetBoard(); }, 300); 
            return true;
        }
        return false;
    }

    function resetBoard() {
        boardState = Array(9).fill("");
        const cells = document.querySelectorAll('.cell');
        cells.forEach(c => { c.innerText = ""; c.classList.remove('winner'); });
        updateUI();
        updateStatus();
        if(isTurn) startTimer();
    }

    function updateStatus() {
        const s = document.getElementById('status');
        if(isTurn) {
            s.innerText = "आपकी बारी है 🔥";
            s.style.color = "var(--accent)";
        } else {
            s.innerText = "दोस्त सोच रहा है... 🤔";
            s.style.color = "var(--gold)";
        }
    }

    // Chat & Utilities
    function sendChat() {
        const input = document.getElementById('msg-input');
        if(!input.value) return;
        conn.send({type:'chat', msg: input.value});
        showChat('You', input.value);
        input.value = "";
    }

    function showChat(sender, msg) {
        const box = document.getElementById('chat-msgs');
        box.innerHTML += `<div><b style="color:var(--accent)">${sender}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function vibrate(ms) { if(navigator.vibrate) navigator.vibrate(ms); }
    
    function copyId() {
        navigator.clipboard.writeText(window.myId);
        alert("ID कॉपी हो गई! अपने दोस्त को भेजें।");
    }
</script>
</body>
</html>
